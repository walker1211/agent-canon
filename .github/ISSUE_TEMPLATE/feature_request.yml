name: Feature request
description: Suggest an improvement or new capability
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Do not include secrets, private prompts, private screenshots, databases, full local paths, or sensitive logs.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - scan / plan
        - export / compile
        - sync / conflicts / resolve
        - apply / rollback
        - verify
        - docs / release / CI
        - other
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety considerations
      description: Note write-boundary, secret-handling, backup, rollback, or global-home implications if relevant.
