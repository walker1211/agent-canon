name: Bug report
description: Report a reproducible problem without sharing secrets or private data
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, tokens, private prompts, private screenshots, databases, full local paths, or sensitive logs.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use sanitized paths such as <repo-root> or ~, and redact secrets.
      placeholder: |
        1. Run ...
        2. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Go version, and agent-canon version or commit. Do not paste private machine paths.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checklist
      options:
        - label: I removed secrets, tokens, private prompts, and sensitive logs.
          required: true
        - label: I replaced full local paths with placeholders such as <repo-root> or ~.
          required: true
