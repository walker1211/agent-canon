name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run secret scan
        run: scripts/secret-scan.sh

      - name: Check formatting
        run: |
          files=$(gofmt -l $(find . -name '*.go' -not -path './.git/*'))
          if [ -n "$files" ]; then
            printf '%s\n' "$files"
            exit 1
          fi

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

      - name: Smoke release package
        run: scripts/package-release.sh v0.0.0-ci
