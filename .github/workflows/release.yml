name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  security-events: read

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run history secret scan
        run: scripts/secret-scan.sh --history

      - name: Run GitHub readiness audit
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/github-readiness.sh --repo "${GITHUB_REPOSITORY}" --strict

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

  build:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Package release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: scripts/package-release.sh "${GITHUB_REF_NAME}"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: agent-canon-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download archives
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/*.tar.gz dist/checksums.txt --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/*.tar.gz dist/checksums.txt --title "${GITHUB_REF_NAME}" --notes "Release ${GITHUB_REF_NAME}"
          fi
